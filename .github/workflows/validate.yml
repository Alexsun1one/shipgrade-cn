name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shipgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile tools
        run: python -m py_compile tools/*.py
      - name: Clean generated bytecode
        run: find . -name __pycache__ -type d -prune -exec rm -rf {} + && find . -name '*.pyc' -delete
      - name: Release check
        run: python tools/shipgrade_release_check.py
